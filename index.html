<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الغياب الإلكتروني مدرسة يزيد بن الحارث</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a2a6c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/aliali1981/yazeed-school/a50150e66ccf86f423cce81d6d402473c4bf15bb/logo.png">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --primary: #1a2a6c; --success: #27ae60; --danger: #c0392b; --bg: #f4f7f9; --dark: #2c3e50; --accent: #f39c12; --info: #2980b9; --leave: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 10px; padding-bottom: 120px; direction: rtl; }
        
        /* الهوية الرسمية الجديدة (تظهر في التطبيق وفي الطباعة) */
        .official-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-bottom: 3px solid var(--primary);
        }
        .header-right { text-align: center; }
        .header-right img { height: 70px; margin-bottom: 5px; }
        .school-info { font-size: 14px; font-weight: bold; line-height: 1.4; color: #000; }
        .school-info p { margin: 0; }
        .header-left img { height: 70px; }

        /* تنسيقات الجدول والقوائم */
        .info-bar { background: white; margin: 10px auto; padding: 10px; border-radius: 10px; display: flex; justify-content: space-around; font-size: 0.8rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; color: var(--primary); }
        .info-bar span { color: var(--danger); }
        .card { background: #ffffff; border-radius: 15px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 15px; overflow: hidden; }
        .main-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        .main-table th { background: var(--primary); color: white; padding: 10px; }
        .main-table td { padding: 10px; text-align: center; border-bottom: 1px solid #eee; font-weight: bold; }

        /* زر الإجراءات */
        .btn-action { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .form-select { width: 100%; padding: 14px; font-weight: bold; border: 2px solid #eee; border-radius: 10px; margin-bottom: 10px; background: white; }

        /* التذييل الرسمي (الاعتماد) */
        .official-footer {
            display: none; /* يظهر فقط في الطباعة أو لوحة المدير */
            margin-top: 30px;
            text-align: left; /* لاعتماد المدير جهة اليسار */
            padding-left: 50px;
        }
        .signature-box { display: inline-block; text-align: center; }
        .signature-title { font-weight: bold; font-size: 16px; margin-bottom: 40px; }
        .signature-name { font-weight: bold; font-size: 18px; border-top: 2px solid #000; padding-top: 5px; }

        .page-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 3px solid var(--primary); padding: 10px 0; text-align: center; z-index: 1000; }

        /* إعدادات الطباعة لتحويل التطبيق إلى مستند رسمي */
        @media print {
            body { background: white; padding: 0; }
            .official-footer { display: block; }
            .btn-action, .form-select, .page-footer, .info-bar { display: none !important; }
            .card { box-shadow: none; border: none; padding: 0; }
            .official-header { box-shadow: none; border-bottom: 2px solid black; }
        }
    </style>
</head>
<body onload="updateClock()">

<div class="official-header">
    <div class="header-right">
        <img src="https://raw.githubusercontent.com/aliali1981/Test/9fa39450ca912dbbfd9e3d25dd0e119401a782f9/ministry.png" alt="وزارة التربية">
        <div class="school-info">
            <p>سلطنة عمان</p>
            <p>وزارة التربية والتعليم</p>
            <p>تعليمية ظفار - إدارة ثمريت</p>
            <p>مدرسة يزيد بن الحارث (5-8) مسائي</p>
        </div>
    </div>
    <div class="header-left">
        <img src="https://raw.githubusercontent.com/aliali1981/Test/9fa39450ca912dbbfd9e3d25dd0e119401a782f9/school.png" alt="شعار المدرسة">
    </div>
</div>

<div class="info-bar">
    <div>اليوم: <span id="clock-day">-</span></div>
    <div>التاريخ: <span id="clock-date">-</span></div>
    <div>الوقت: <span id="clock-time">-</span></div>
</div>

<div class="card" style="text-align: center;">
    <h3 onclick="adminShortcut()" style="margin:0 0 10px 0; color:var(--primary); cursor: pointer;">🇴🇲 نظام رصد الغياب الرقمي</h3>
    
    <select id="classSelect" onchange="fetchClassData()" class="form-select">
        <option value="">-- اختر الصف الدراسي --</option>
        <optgroup label="خامس"><option value="5-1">خامس 1</option><option value="5-2">خامس 2</option><option value="5-3">خامس 3</option></optgroup>
        <optgroup label="سادس"><option value="6-1">سادس 1</option><option value="6-2">سادس 2</option></optgroup>
        <optgroup label="سابع"><option value="7-1">سابع 1</option><option value="7-2">سابع 2</option><option value="7-3">سابع 3</option></optgroup>
        <optgroup label="ثامن"><option value="8-1">ثامن 1</option><option value="8-2">ثامن 2</option></optgroup>
    </select>

    <select id="lessonSelect" onchange="setLesson(this.value)" class="form-select" style="border-color: var(--accent);">
        <option value="1">حصة 1</option><option value="2">حصة 2</option><option value="3">حصة 3</option>
        <option value="4">حصة 4</option><option value="5">حصة 5</option><option value="6">حصة 6</option><option value="7">حصة 7</option>
    </select>
</div>

<div id="mainAppArea" class="card" style="display:none;">
    <table class="main-table">
        <thead><tr><th>م</th><th>اسم الطالب</th><th>الحالة</th></tr></thead>
        <tbody id="studentsListBody"></tbody>
    </table>
    <button class="btn-action" style="background:var(--success)" onclick="pushToCloud()">حفظ غياب اليوم ✅</button>
</div>

<div class="official-footer">
    <div class="signature-box">
        <div class="signature-title">مدير المدرسة</div>
        <div class="signature-name">الأستاذ / هشام الكحالي</div>
    </div>
</div>

<footer class="page-footer">
    <div style="font-size: 0.7rem; color: #777;">نظام الإدارة الرقمي - مدرسة يزيد بن الحارث</div>
    <div style="color: var(--primary); font-weight: 800; font-size: 0.9rem;">إشراف: الأستاذ هشام الكحالي</div>
</footer>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = { apiKey: "AIzaSyAzmsbAn5jVh293t7X79NmyzSZFDFXFpdg", databaseURL: "https://oman-school-app-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // بقية أكواد الجافاسكريبت والطلاب (التي أرفقتها) تظل كما هي لضمان عمل التطبيق...
    // (اختصاراً سأضع الدوال الأساسية لضمان عمل الواجهة)
    
    function updateClock() {
        const now = new Date();
        const days = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
        document.getElementById('clock-day').innerText = days[now.getDay()];
        document.getElementById('clock-date').innerText = now.toLocaleDateString('ar-EG');
        document.getElementById('clock-time').innerText = now.toLocaleTimeString('ar-EG');
        setTimeout(updateClock, 1000);
    }

    let todayKey = new Date().toISOString().split('T')[0];
    let selectedLesson = 1;

    function setLesson(num) { selectedLesson = num; fetchClassData(); }

    // هنا تضع مصفوفة "قائمة_الطلاب_كاملة" التي كانت في كودك...
    const قائمة_الطلاب_كاملة = {
        "5-1": ["أحمد بن سالم بن سعيد حسن خوار", "الامين محمد احمد الطيب", "تركي بن محمد بن سعيد مسلم مسن", "خالد بن راشد بن سعيد سالم مسن", "سالم بن محمد بن سالم صالح جداد", "سالم بن مسلم بن سهيل محمد الراشدي", "سعود بن سالم بن ظويهر سالم جداد", "سعود بن شهاب بن نافع مسلم المسهلي الكثيري", "سعيد بن عبدالله بن بقال خويدع خوار", "سلطان بن محمد بن علي مهوي العامري", "عامر بن سهيل بن عامر سليّم قمصيت", "عبدالرحمن احمد فوزي عبدالفتاح", "علي بن سعد بن مسلم سعيد الراشدي", "عوض بن محمد بن عوض خادم الوهيبي", "غانم بن محمد بن سليم مسلم الجنيبي", "غانم بن محمد بن مبارك بخيت جداد", "محمد احمد محمود عبدالحميد", "محمد بن مسلم بن محمد بخيت مسن", "نايف بن محمد بن سالم سهيل مسن", "همدان بن احمد بن عبدالله محمد جداد"]
        // أضف بقية الصفوف هنا كما في كودك الأصلي
    };

    function fetchClassData() {
        const cls = document.getElementById('classSelect').value;
        if(!cls) return;
        database.ref(`attendance/${todayKey}/${cls}/حصة_${selectedLesson}`).once('value', (snap) => {
            const data = snap.val() || {};
            const listBody = document.getElementById('studentsListBody');
            listBody.innerHTML = "";
            قائمة_الطلاب_كاملة[cls]?.forEach((name, i) => {
                let status = data[i]?.status || 'p';
                listBody.innerHTML += `<tr><td>${i+1}</td><td style="text-align:right;">${name}</td><td><select id="stat${i}" class="form-select" style="padding:5px; margin:0;"><option value="p" ${status=='p'?'selected':''}>حاضر</option><option value="a" ${status=='a'?'selected':''}>غائب</option></select></td></tr>`;
            });
            document.getElementById('mainAppArea').style.display = "block";
        });
    }

    function pushToCloud() {
        const cls = document.getElementById('classSelect').value;
        let update = {};
        قائمة_الطلاب_كاملة[cls].forEach((_, i) => { update[i] = { status: document.getElementById('stat'+i).value }; });
        database.ref(`attendance/${todayKey}/${cls}/حصة_${selectedLesson}`).set(update).then(() => alert("✅ تم الحفظ"));
    }
</script>

</body>
</html>

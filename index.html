<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الغياب الإلكتروني مدرسة يزيد بن الحارث</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a2a6c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/aliali1981/yazeed-school/a50150e66ccf86f423cce81d6d402473c4bf15bb/logo.png">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --primary: #1a2a6c; --success: #27ae60; --danger: #c0392b; --bg: #f4f7f9; --dark: #2c3e50; --accent: #f39c12; --info: #2980b9; --leave: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 10px; padding-bottom: 120px; direction: rtl; }
        .info-bar { background: white; margin: 10px auto; padding: 10px; border-radius: 10px; display: flex; justify-content: space-around; font-size: 0.8rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; color: var(--primary); }
        .info-bar span { color: var(--danger); }
        .logo-container { text-align: center; margin-bottom: 10px; }
        .logo-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary); background: white; padding: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card { background: #ffffff; border-radius: 15px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 15px; overflow: hidden; }
        .pro-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: 10px; }
        .pro-table th { background: var(--primary); color: white; padding: 12px; font-size: 0.85rem; }
        .pro-table td { background: white; padding: 12px; text-align: center; border-top: 1px solid #eee; border-bottom: 1px solid #eee; font-weight: bold; }
        .row-5 { background-color: #e3f2fd !important; border-right: 5px solid #2196f3; }
        .row-6 { background-color: #e8f5e9 !important; border-right: 5px solid #4caf50; }
        .row-7 { background-color: #fff3e0 !important; border-right: 5px solid #ff9800; }
        .row-8 { background-color: #f3e5f5 !important; border-right: 5px solid #9c27b0; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
        .stat-box { padding: 10px 5px; border-radius: 10px; text-align: center; color: white; font-weight: bold; font-size: 0.75rem; }
        .stat-full { grid-column: span 1.5; font-size: 0.85rem; }
        .main-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8rem; }
        .main-table th { background: linear-gradient(to bottom, var(--primary), #2a5298); color: white; padding: 10px 2px; }
        .main-table td { padding: 10px 5px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.05); font-weight: 700; }
        .admin-summary { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 15px; }
        .summary-card { background: var(--dark); color: white; padding: 10px 5px; border-radius: 12px; text-align: center; border-bottom: 4px solid var(--accent); grid-column: span 2; }
        .summary-card.wide { grid-column: span 3; }
        .summary-card span { display: block; font-size: 1.1rem; color: var(--accent); font-weight: 800; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-excel { background: #1d6f42; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 48%; margin-top: 10px; cursor: pointer; }
        .btn-pdf { background: #8e44ad; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 48%; margin-top: 10px; cursor: pointer; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; background: #ddd; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .page-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 3px solid var(--primary); padding: 10px 0; text-align: center; z-index: 1000; }
        .form-select { width: 100%; padding: 14px; font-weight: bold; border: 2px solid #eee; border-radius: 10px; margin-bottom: 10px; background: white; }
    </style>
</head>
<body onload="updateClock()">

<div class="logo-container">
    <img src="https://raw.githubusercontent.com/aliali1981/yazeed-school/a50150e66ccf86f423cce81d6d402473c4bf15bb/logo.png" class="logo-img" alt="شعار المدرسة">
</div>

<div class="info-bar">
    <div>اليوم: <span id="clock-day">-</span></div>
    <div>التاريخ: <span id="clock-date">-</span></div>
    <div>الوقت: <span id="clock-time">-</span></div>
</div>

<div class="card" style="text-align: center;">
    <h3 onclick="adminShortcut()" style="margin:0 0 10px 0; color:var(--primary); cursor: pointer;">🇴🇲 مدرسة يزيد بن الحارث للتعليم الأساسي</h3>
    
    <select id="classSelect" onchange="fetchClassData()" class="form-select">
        <option value="">-- اختر الصف الدراسي --</option>
        <optgroup label="خامس"><option value="5-1">خامس 1</option><option value="5-2">خامس 2</option><option value="5-3">خامس 3</option></optgroup>
        <optgroup label="سادس"><option value="6-1">سادس 1</option><option value="6-2">سادس 2</option></optgroup>
        <optgroup label="سابع"><option value="7-1">سابع 1</option><option value="7-2">سابع 2</option><option value="7-3">سابع 3</option></optgroup>
        <optgroup label="ثامن"><option value="8-1">ثامن 1</option><option value="8-2">ثامن 2</option></optgroup>
    </select>

    <select id="lessonSelect" onchange="setLesson(this.value)" class="form-select" style="border-color: var(--accent);">
        <option value="1">حصة 1</option>
        <option value="2">حصة 2</option>
        <option value="3">حصة 3</option>
        <option value="4">حصة 4</option>
        <option value="5">حصة 5</option>
        <option value="6">حصة 6</option>
        <option value="7">حصة 7</option>
    </select>

    <div id="teacherStats" class="stats-grid" style="display:none;">
        <div class="stat-box" style="background:var(--dark)">الطلاب<br><span id="tTotal">0</span></div>
        <div class="stat-box" style="background:var(--success)">حاضر<br><span id="tPres">0</span></div>
        <div class="stat-box" style="background:var(--danger)">غائب<br><span id="tAbs">0</span></div>
    </div>
</div>

<div id="loginArea" class="card" style="display:none;">
    <input type="password" id="passInput" placeholder="أدخل رمز المدير..." style="width:100%; padding:12px; border:2px solid #eee; border-radius:8px;">
    <button onclick="checkPassword()" class="btn-action">دخول الصلاحيات</button>
</div>

<div id="mainAppArea" class="card" style="display:none;">
    <table class="main-table">
        <thead><tr><th>م</th><th>اسم الطالب</th><th>الحالة</th></tr></thead>
        <tbody id="studentsListBody"></tbody>
    </table>
    <button class="btn-action" style="background:var(--success)" onclick="pushToCloud()">حفظ غياب اليوم ✅</button>
</div>

<div id="adminPanel" style="display:none; padding-bottom:120px;">
    
    <div class="admin-summary">
        <div class="summary-card">إجمالي الطلاب <span id="sTotal">0</span></div>
        <div class="summary-card">عدد الحضور <span id="sPres">0</span></div>
        <div class="summary-card">عدد الغياب <span id="sAbs">0</span></div>
        <div class="summary-card wide">نسبة الحضور <span id="sPresPerc">0%</span></div>
        <div class="summary-card wide">نسبة الغياب <span id="sAbsPerc">0%</span></div>
    </div>

    <div class="card">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('periodTab', this)">تقرير فترة</button>
            <button class="tab-btn" onclick="openTab('dailyTab', this)">غياب يوم</button>
            <button class="tab-btn" onclick="openTab('historyTab', this)">سجل طالب</button>
        </div>

        <div id="periodTab" class="tab-content active">
            <div style="display: flex; gap: 5px; margin-bottom:10px;">
                <input type="date" id="periodStart" style="flex:1; padding:10px; border-radius:8px; border:2px solid #eee;">
                <input type="date" id="periodEnd" style="flex:1; padding:10px; border-radius:8px; border:2px solid #eee;">
            </div>
            <button class="btn-action" onclick="generatePeriodReport()">🔍 توليد تقرير الفترة</button>
            <div id="periodPrintArea">
                <div id="periodResultArea" style="margin-top:15px;"></div>
            </div>
            <div id="periodBtns" style="display:none; justify-content: space-between;">
                <button class="btn-excel" onclick="exportToExcel('periodPrintArea', 'تقرير_الفترة')">Excel</button>
                <button class="btn-pdf" onclick="exportToPDF('periodPrintArea', 'تقرير_الفترة')">PDF</button>
            </div>
        </div>

        <div id="dailyTab" class="tab-content">
            <input type="date" id="adminDateSelector" style="width:100%; padding:10px; border-radius:8px; border:2px solid #eee;" onchange="viewOldDate(this.value)">
            <div id="dailyPrintArea">
                <div id="oldDateResult" style="margin-top:15px;"></div>
            </div>
            <div id="dailyBtns" style="display:none; justify-content: space-between;">
                <button class="btn-excel" onclick="exportToExcel('dailyPrintArea', 'غياب_اليوم')">Excel</button>
                <button class="btn-pdf" onclick="exportToPDF('dailyPrintArea', 'غياب_اليوم')">PDF</button>
            </div>
        </div>

        <div id="historyTab" class="tab-content">
            <input type="text" id="studentSearch" style="width:100%; padding:12px; border:2px solid var(--accent); border-radius:8px;" placeholder="اكتب اسم الطالب كاملاً للبحث...">
            <button class="btn-action" onclick="searchStudentHistory()">🔍 بحث عن السجل</button>
            <div id="studentPrintArea">
                <div id="historyResult" style="margin-top:20px;"></div>
            </div>
            <div id="studentBtns" style="display:none; justify-content: space-between;">
                <button class="btn-excel" onclick="exportToExcel('studentPrintArea', 'سجل_طالب')">Excel</button>
                <button class="btn-pdf" onclick="exportToPDF('studentPrintArea', 'سجل_طالب')">PDF</button>
            </div>
        </div>
    </div>
</div>

<footer class="page-footer">
    <div style="font-size: 0.7rem; color: #777;">نظام الإدارة الرقمي - مدرسة يزيد بن الحارث</div>
    <div style="color: var(--primary); font-weight: 800; font-size: 0.9rem;">الأستاذ هشام الكحالي</div>
</footer>

    let selectedLesson = 1;
    let todayKey = new Date().toISOString().split('T')[0];

    function updateClock() {
        const now = new Date();
        const days = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
        document.getElementById('clock-day').innerText = days[now.getDay()];
        document.getElementById('clock-date').innerText = now.toLocaleDateString('ar-EG');
        document.getElementById('clock-time').innerText = now.toLocaleTimeString('ar-EG');
        setTimeout(updateClock, 1000);
    }

    // --- وظائف لوحة المعلم ---
    function setLesson(num) { selectedLesson = num; fetchClassData(); }

    function fetchClassData() {
        const cls = document.getElementById('classSelect').value;
        if(!cls) return;
        database.ref(`attendance/${todayKey}/${cls}/حصة_${selectedLesson}`).once('value', (snap) => {
            const data = snap.val() || {};
            const listBody = document.getElementById('studentsListBody');
            listBody.innerHTML = "";
            قائمة_الطلاب_كاملة[cls].forEach((name, i) => {
                let status = data[i]?.status || 'p';
                listBody.innerHTML += `<tr><td>${i+1}</td><td style="text-align:right;">${name}</td><td><select id="stat${i}" onchange="updateTeacherStats('${cls}')"><option value="p" ${status=='p'?'selected':''}>حاضر</option><option value="a" ${status=='a'?'selected':''}>غائب</option></select></td></tr>`;
            });
            document.getElementById('mainAppArea').style.display = "block";
            updateTeacherStats(cls);
        });
    }

    function updateTeacherStats(cls) {
        const total = قائمة_الطلاب_كاملة[cls].length;
        let abs = 0; قائمة_الطلاب_كاملة[cls].forEach((_, i) => { if(document.getElementById('stat'+i)?.value === 'a') abs++; });
        document.getElementById('teacherStats').style.display = 'grid';
        document.getElementById('tTotal').innerText = total; document.getElementById('tPres').innerText = total - abs; document.getElementById('tAbs').innerText = abs;
    }

    function pushToCloud() {
        const cls = document.getElementById('classSelect').value;
        let update = {}; قائمة_الطلاب_كاملة[cls].forEach((_, i) => { update[i] = { status: document.getElementById('stat'+i).value }; });
        database.ref(`attendance/${todayKey}/${cls}/حصة_${selectedLesson}`).set(update).then(() => alert("✅ تم حفظ الغياب"));
    }

    // --- وظائف لوحة المدير ---
    function adminShortcut() { 
        window.cCount = (window.cCount || 0) + 1;
        if(window.cCount === 3) document.getElementById('loginArea').style.display="block";
        setTimeout(()=>window.cCount=0, 2000);
    }

    function checkPassword() {
        if(document.getElementById('passInput').value === "12345678910") {
            document.getElementById('loginArea').style.display = "none";
            document.getElementById('adminPanel').style.display = "block";
            startAdminSync();
        } else alert("رمز غير صحيح");
    }

    function startAdminSync() {
        database.ref(`attendance/${todayKey}`).on('value', (snap) => {
            const dayData = snap.val() || {};
            let schTotal = 0, schAbs = 0, html = "";
            Object.keys(قائمة_الطلاب_كاملة).sort().forEach(cls => {
                let cSize = قائمة_الطلاب_كاملة[cls].length;
                let cAbs = 0;
                if(dayData[cls]) {
                    قائمة_الطلاب_كاملة[cls].forEach((_, i) => {
                        let isAbs = false;
                        for(let lesson in dayData[cls]) { if(dayData[cls][lesson][i]?.status === 'a') isAbs = true; }
                        if(isAbs) cAbs++;
                    });
                }
                schTotal += cSize; schAbs += cAbs;
                let pPerc = Math.round(((cSize-cAbs)/cSize)*100);
                html += `<tr class="row-${cls[0]}"><td>${cls}</td><td>${cSize}</td><td>${cSize-cAbs}</td><td>${cAbs}</td><td>${pPerc}%</td><td>${100-pPerc}%</td></tr>`;
            });
            document.getElementById('sTotal').innerText = schTotal;
            document.getElementById('sPres').innerText = schTotal - schAbs;
            document.getElementById('sAbs').innerText = schAbs;
            let totalPerc = schTotal > 0 ? Math.round(((schTotal-schAbs)/schTotal)*100) : 0;
            document.getElementById('sPresPerc').innerText = totalPerc + "%";
            document.getElementById('sAbsPerc').innerText = (100 - totalPerc) + "%";
            document.getElementById('masterTableBody').innerHTML = html;
        });
    }

    // 1. توليد تقرير فترة
    function generatePeriodReport() {
        const start = document.getElementById('periodStart').value;
        const end = document.getElementById('periodEnd').value;
        if(!start || !end) { alert("يرجى اختيار تاريخ البداية والنهاية"); return; }

        database.ref('attendance').once('value', (snap) => {
            const allData = snap.val() || {};
            let counts = {}; 
            Object.keys(allData).forEach(date => {
                if(date >= start && date <= end) {
                    Object.keys(allData[date]).forEach(cls => {
                        قائمة_الطلاب_كاملة[cls]?.forEach((name, i) => {
                            let isAbs = false;
                            for(let L in allData[date][cls]) { if(allData[date][cls][L][i]?.status === 'a') isAbs = true; }
                            if(isAbs) {
                                if(!counts[name]) counts[name] = { cls: cls, count: 0 };
                                counts[name].count++;
                            }
                        });
                    });
                }
            });

            let html = `<table class="pro-table"><thead><tr><th>الاسم</th><th>الصف</th><th>أيام الغياب</th></tr></thead><tbody>`;
            Object.entries(counts).forEach(([name, info]) => {
                html += `<tr><td>${name}</td><td>${info.cls}</td><td style="color:red">${info.count}</td></tr>`;
            });
            document.getElementById('periodResultArea').innerHTML = html + "</tbody></table>";
            document.getElementById('periodBtns').style.display = 'flex';
        });
    }

    // 2. غياب يوم محدد
    function viewOldDate(date) {
        if(!date) return;
        database.ref(`attendance/${date}`).once('value', (snap) => {
            const data = snap.val();
            if(!data) { document.getElementById('oldDateResult').innerHTML = "لا توجد بيانات لهذا اليوم"; return; }
            
            let html = `<table class="main-table"><thead><tr><th>الصف</th><th>الطلاب</th><th>الغياب</th></tr></thead><tbody>`;
            Object.keys(قائمة_الطلاب_كاملة).sort().forEach(cls => {
                let absNames = [];
                قائمة_الطلاب_كاملة[cls].forEach((name, i) => {
                    let isAbs = false;
                    for(let L in data[cls]) { if(data[cls][L][i]?.status === 'a') isAbs = true; }
                    if(isAbs) absNames.push(name);
                });
                html += `<tr><td>${cls}</td><td>${قائمة_الطلاب_كاملة[cls].length}</td><td>${absNames.length}</td></tr>`;
            });
            document.getElementById('oldDateResult').innerHTML = html + "</tbody></table>";
            document.getElementById('dailyBtns').style.display = 'flex';
        });
    }

    // 3. سجل طالب محدد
    function searchStudentHistory() {
        const searchName = document.getElementById('studentSearch').value.trim();
        if(!searchName) return;

        database.ref('attendance').once('value', (snap) => {
            const allData = snap.val() || {};
            let html = `<h4>سجل الطالب: ${searchName}</h4><table class="pro-table"><thead><tr><th>التاريخ</th><th>الحالة</th></tr></thead><tbody>`;
            let found = false;

            Object.keys(allData).sort().reverse().forEach(date => {
                Object.keys(allData[date]).forEach(cls => {
                    let idx = قائمة_الطلاب_كاملة[cls].indexOf(searchName);
                    if(idx !== -1) {
                        let isAbs = false;
                        for(let L in allData[date][cls]) { if(allData[date][cls][L][idx]?.status === 'a') isAbs = true; }
                        if(isAbs) {
                            html += `<tr><td>${date}</td><td style="color:red">غائب</td></tr>`;
                            found = true;
                        }
                    }
                });
            });

            if(!found) html += `<tr><td colspan="2">لا يوجد غياب مسجل لهذا الطالب</td></tr>`;
            document.getElementById('historyResult').innerHTML = html + "</tbody></table>";
            document.getElementById('studentBtns').style.display = 'flex';
        });
    }

    // --- وظائف التصدير العامة ---
    function exportToExcel(id, filename) {
        let table = document.getElementById(id);
        let wb = XLSX.utils.table_to_book(table);
        XLSX.writeFile(wb, `${filename}.xlsx`);
    }

    function exportToPDF(id, filename) {
        const element = document.getElementById(id);
        const dateStr = document.getElementById('clock-date').innerText;
        const printWindow = document.createElement('div');
        printWindow.style.padding = '20px'; printWindow.style.direction = 'rtl';
        printWindow.innerHTML = `<div style="text-align:center; border-bottom:2px solid #1a2a6c; margin-bottom:15px;">
            <h2>مدرسة يزيد بن الحارث</h2><h3>${filename}</h3><p>تاريخ الاستخراج: ${dateStr}</p><p>يعتمد / مدير المدرسة: أ. هشام الكحالي</p></div>` + element.innerHTML;
        
        const opt = { margin: 10, filename: `${filename}.pdf`, image: { type: 'jpeg', quality: 1 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
        html2pdf().from(printWindow).set(opt).save();
    }

    function openTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active'); btn.classList.add('active');
    }

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستند رسمي - مدرسة يزيد بن الحارث</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 40px;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
        }

        /* حاوية الورقة (A4) */
        .a4-page {
            background-color: #fff;
            width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
        }

        /* الترويسة العليا */
        .official-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
            margin-bottom: 40px;
        }

        .gov-info p {
            margin: 0;
            font-size: 14px;
            font-weight: bold;
            line-height: 1.6;
        }

        .logos-container {
            text-align: center;
        }

        .logos-container img {
            height: 80px;
            margin-bottom: 5px;
        }

        /* محتوى الصفحة الوسطي */
        .main-content {
            text-align: center;
            margin-top: 100px;
            min-height: 400px;
        }

        /* قسم الاعتماد في الأسفل جهة اليسار */
        .approval-section {
            position: absolute;
            bottom: 40mm;
            left: 20mm;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .approval-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 50px; /* مساحة للتوقيع */
        }

        .approval-name-box {
            position: relative;
            border-top: 1.5px solid #000;
            padding-top: 8px;
            min-width: 180px;
        }

        .approval-name {
            font-size: 19px;
            font-weight: bold;
        }

        /* رمز الختم الدائري */
        .stamp-placeholder {
            position: absolute;
            right: -60px;
            top: -40px;
            width: 80px;
            height: 80px;
            border: 2px dashed #ccc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
            font-size: 12px;
            transform: rotate(-15px);
        }

        @media print {
            body { background: none; padding: 0; }
            .a4-page { box-shadow: none; border: none; width: 100%; margin: 0; }
            .stamp-placeholder { border-color: #eee; } /* تخفيف لون الختم عند الطباعة */
        }
    </style>
</head>
<body>

<div class="a4-page">
    <header class="official-header">
        <div class="gov-info">
            <p>سلطنة عمان</p>
            <p>وزارة التربية والتعليم</p>
            <p>المديرية العامة للتربية والتعليم بمحافظة ظفار</p>
            <p>إدارة التربية والتعليم بثمريت</p>
            <p>مدرسة يزيد بن الحارث للتعليم الأساسي ( 5 – 8 ) مسائي</p>
        </div>
        
        <div class="logos-container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Logo_of_the_Ministry_of_Education_of_Oman.svg/1200px-Logo_of_the_Ministry_of_Education_of_Oman.svg.png" alt="شعار وزارة التربية والتعليم">
        </div>
    </header>

    <main class="main-content">
        <h1 style="text-decoration: underline;">عنوان الموضوع</h1>
        <p>اكتب هنا تفاصيل المبادرة أو الجدول الدراسي أو أي محتوى تعليمي آخر...</p>
    </main>

    <section class="approval-section">
        <div class="approval-title">مدير المدرسة</div>
        <div class="approval-name-box">
            <div class="approval-name">أ / هشام الكحالي</div>
            <div class="stamp-placeholder">مكان الختم</div>
        </div>
    </section>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستند مدرسة يزيد بن الحارث الرسمي</title>
    <style>
        /* إعدادات عامة للخطوط والخلفية */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
        }

        /* حاوية الصفحة الرئيسية - محاكاة لورقة A4 */
        .document-page {
            background-color: #ffffff;
            width: 210mm;
            min-height: 297mm;
            padding: 15mm 20mm;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* تنسيق الترويسة العليا (Header) */
        .official-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .school-info {
            flex: 2;
        }

        .school-info p {
            margin: 2px 0;
            font-size: 15px;
            font-weight: bold;
            color: #000;
        }

        .ministry-logo {
            flex: 1;
            text-align: left;
        }

        .ministry-logo img {
            max-width: 140px;
            height: auto;
        }

        /* منطقة المحتوى الرئيسي */
        .main-content {
            flex-grow: 1;
            text-align: center;
            padding-top: 20px;
        }

        .content-placeholder {
            border: 1px dashed #ccc;
            padding: 40px;
            margin-top: 20px;
            color: #888;
            font-size: 18px;
        }

        /* قسم الاعتماد في أسفل اليسار */
        .approval-footer {
            margin-top: auto; /* يدفع القسم للأسفل دائماً */
            display: flex;
            justify-content: flex-start; /* يبدأ من اليمين في RTL وهو اليسار فعلياً */
            padding-bottom: 20px;
        }

        .signature-box {
            margin-right: auto; /* يدفع المربع لأقصى اليسار في نظام RTL */
            text-align: center;
            min-width: 200px;
        }

        .signature-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 40px; /* مساحة فارغة للتوقيع اليدوي أو الختم */
        }

        .signature-name {
            font-size: 20px;
            font-weight: bold;
            border-top: 1.5px solid #000;
            padding-top: 5px;
            display: inline-block;
            min-width: 180px;
        }

        /* إعدادات الطباعة */
        @media print {
            body { background: none; padding: 0; }
            .document-page { box-shadow: none; border: none; width: 100%; margin: 0; }
            .content-placeholder { border: none; }
        }
    </style>
</head>
<body>

    <div class="document-page">
        <header class="official-header">
            <div class="school-info">
                <p>سلطنة عمان</p>
                <p>وزارة التربية والتعليم</p>
                <p>المديرية العامة للتربية والتعليم بمحافظة ظفار</p>
                <p>إدارة التربية والتعليم بثمريت</p>
                <p>مدرسة يزيد بن الحارث للتعليم الأساسي ( 5 – 8 ) مسائي</p>
            </div>
            
            <div class="ministry-logo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Logo_of_the_Ministry_of_Education_of_Oman.svg/1200px-Logo_of_the_Ministry_of_Education_of_Oman.svg.png" alt="شعار وزارة التربية والتعليم">
            </div>
        </header>

        <main class="main-content">
            <h2 style="text-decoration: underline;">أدخل عنوان المستند هنا</h2>
            <div class="content-placeholder">
                هذه المساحة مخصصة لمحتوى المبادرة أو الدرس التعليمي.
            </div>
        </main>

        <footer class="approval-footer">
            <div class="signature-box">
                <div class="signature-title">مدير المدرسة</div>
                <div class="signature-name">أ / هشام الكحالي</div>
            </div>
        </footer>
    </div>

</body>
</html>

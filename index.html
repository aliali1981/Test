<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الغياب الإلكتروني مدرسة يزيد بن الحارث</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --primary: #1a2a6c; --success: #27ae60; --danger: #c0392b; --bg: #f4f7f9; --dark: #2c3e50; --accent: #f39c12; --info: #2980b9; --leave: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 10px; padding-bottom: 120px; direction: rtl; }
        .info-bar { background: white; margin: 10px auto; padding: 10px; border-radius: 10px; display: flex; justify-content: space-around; font-size: 0.8rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; color: var(--primary); }
        .logo-container { text-align: center; margin-bottom: 10px; }
        .logo-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary); background: white; padding: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card { background: #ffffff; border-radius: 15px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 15px; }
        .main-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8rem; background: white; }
        .main-table th { background: var(--primary); color: white; padding: 10px; border: 1px solid #ddd; }
        .main-table td { padding: 10px; text-align: center; border: 1px solid #ddd; font-weight: bold; }
        .admin-summary { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 15px; }
        .summary-card { background: var(--dark); color: white; padding: 10px 5px; border-radius: 12px; text-align: center; grid-column: span 2; }
        .summary-card span { display: block; font-size: 1.1rem; color: var(--accent); font-weight: 800; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-excel { background: #1d6f42; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; flex: 1; }
        .btn-pdf { background: #c0392b; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; flex: 1; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; background: #ddd; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-select { width: 100%; padding: 14px; font-weight: bold; border: 2px solid #eee; border-radius: 10px; margin-bottom: 10px; }
        .page-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 3px solid var(--primary); padding: 10px 0; text-align: center; }
        
        /* ترويسة الطباعة الرسمية */
        #pdfHeader { display: none; padding: 20px; border-bottom: 3px double #000; margin-bottom: 20px; }
    </style>
</head>
<body onload="updateClock()">

<div id="pdfHeader">
    <div style="display: flex; justify-content: space-between; align-items: center; direction: rtl;">
        <div style="text-align: right; line-height: 1.6;">
            <b>سلطنة عمان</b><br>
            <b>وزارة التربية والتعليم</b><br>
            <b>مدرسة يزيد بن الحارث (5-8)</b>
        </div>
        <div style="text-align: center;">
            <img src="https://raw.githubusercontent.com/aliali1981/yazeed-school/a50150e66ccf86f423cce81d6d402473c4bf15bb/logo.png" style="width: 80px;">
            <h2 style="margin: 10px 0;">تقرير نظام الغياب الإلكتروني</h2>
        </div>
        <div style="text-align: left; line-height: 1.6;">
            <b>يعتمد مدير المدرسة:</b><br>
            <b>أ. هشام الكحالي</b>
        </div>
    </div>
</div>

<div class="logo-container">
    <img src="https://raw.githubusercontent.com/aliali1981/yazeed-school/a50150e66ccf86f423cce81d6d402473c4bf15bb/logo.png" class="logo-img" alt="شعار المدرسة">
</div>

<div class="info-bar">
    <div>اليوم: <span id="clock-day">-</span></div>
    <div>التاريخ: <span id="clock-date">-</span></div>
    <div>الوقت: <span id="clock-time">-</span></div>
</div>

<div class="card" style="text-align: center;">
    <h3 onclick="adminShortcut()" style="margin:0 0 10px 0; color:var(--primary); cursor: pointer;">🇴🇲 مدرسة يزيد بن الحارث للتعليم الأساسي</h3>
    <select id="classSelect" onchange="fetchClassData()" class="form-select">
        <option value="">-- اختر الصف الدراسي --</option>
        <optgroup label="خامس"><option value="5-1">خامس 1</option><option value="5-2">خامس 2</option><option value="5-3">خامس 3</option></optgroup>
        <optgroup label="سادس"><option value="6-1">سادس 1</option><option value="6-2">سادس 2</option></optgroup>
        <optgroup label="سابع"><option value="7-1">سابع 1</option><option value="7-2">سابع 2</option><option value="7-3">سابع 3</option></optgroup>
        <optgroup label="ثامن"><option value="8-1">ثامن 1</option><option value="8-2">ثامن 2</option></optgroup>
    </select>
    <select id="lessonSelect" onchange="setLesson(this.value)" class="form-select" style="border-color: var(--accent);">
        <option value="1">حصة 1</option><option value="2">حصة 2</option><option value="3">حصة 3</option>
        <option value="4">حصة 4</option><option value="5">حصة 5</option><option value="6">حصة 6</option><option value="7">حصة 7</option>
    </select>
</div>

<div id="loginArea" class="card" style="display:none;">
    <input type="password" id="passInput" placeholder="أدخل رمز المدير..." style="width:100%; padding:12px; border:2px solid #eee; border-radius:8px;">
    <button onclick="checkPassword()" class="btn-action">دخول الصلاحيات</button>
</div>

<div id="mainAppArea" class="card" style="display:none;">
    <table class="main-table">
        <thead><tr><th>م</th><th>اسم الطالب</th><th>الحالة</th></tr></thead>
        <tbody id="studentsListBody"></tbody>
    </table>
    <button class="btn-action" style="background:var(--success)" onclick="pushToCloud()">حفظ غياب اليوم ✅</button>
</div>

<div id="adminPanel" style="display:none; padding-bottom:120px;">
    <div class="admin-summary">
        <div class="summary-card">إجمالي الطلاب <span id="sTotal">0</span></div>
        <div class="summary-card">الحضور <span id="sPres">0</span></div>
        <div class="summary-card">الغياب <span id="sAbs">0</span></div>
    </div>

    <div class="card" id="exportArea">
        <div id="exportHeaderPlace" style="display:none"></div>
        <table class="main-table" id="masterTable">
            <thead>
                <tr><th>الصف</th><th>العدد</th><th>حاضر</th><th>غائب</th><th>% حضور</th></tr>
            </thead>
            <tbody id="masterTableBody"></tbody>
        </table>
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <button class="btn-excel" onclick="exportExcel()">📥 اكسيل</button>
        <button class="btn-pdf" onclick="exportPDF()">📄 بي دي اف</button>
    </div>

    <div class="card">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('periodTab', this)">تقرير فترة</button>
            <button class="tab-btn" onclick="openTab('dailyTab', this)">غياب يوم</button>
        </div>

        <div id="periodTab" class="tab-content active">
            <input type="date" id="periodStart" class="form-select">
            <input type="date" id="periodEnd" class="form-select">
            <button class="btn-action" onclick="generatePeriodReport()">توليد التقرير</button>
            <div id="periodResultArea" style="margin-top:15px;"></div>
        </div>

        <div id="dailyTab" class="tab-content">
            <input type="date" id="adminDateSelector" class="form-select" onchange="viewOldDate(this.value)">
            <div id="oldDateResult" style="margin-top:15px;"></div>
        </div>
    </div>
</div>

<footer class="page-footer">
    <div style="color: var(--primary); font-weight: 800;">الأستاذ هشام الكحالي</div>
</footer>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAzmsbAn5jVh293t7X79NmyzSZFDFXFpdg", databaseURL: "https://oman-school-app-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // القائمة الكاملة (مختصرة هنا للوضوح، استعمل قائمتك الكاملة)
    const قائمة_الطلاب_كاملة = { "5-1": ["أحمد بن سالم", "الامين محمد"], "5-2": ["خالد بن أحمد", "سالم بن حمد"], "7-1": ["أحمد بن سعيد", "العبد بن محمد"] };

    let selectedLesson = 1;
    let todayKey = new Date().toISOString().split('T')[0];

    function updateClock() {
        const now = new Date();
        document.getElementById('clock-date').innerText = now.toLocaleDateString('ar-EG');
        document.getElementById('clock-time').innerText = now.toLocaleTimeString('ar-EG');
        setTimeout(updateClock, 1000);
    }

    function setLesson(v) { selectedLesson = v; fetchClassData(); }

    function fetchClassData() {
        const cls = document.getElementById('classSelect').value; if(!cls) return;
        database.ref(`attendance/${todayKey}/${cls}/حصة_${selectedLesson}`).once('value', (snap) => {
            const data = snap.val() || {};
            let html = "";
            قائمة_الطلاب_كاملة[cls].forEach((name, i) => {
                let status = data[i]?.status || 'p';
                html += `<tr><td>${i+1}</td><td>${name}</td><td><select id="stat${i}"><option value="p" ${status=='p'?'selected':''}>حاضر</option><option value="a" ${status=='a'?'selected':''}>غائب</option></select></td></tr>`;
            });
            document.getElementById('studentsListBody').innerHTML = html;
            document.getElementById('mainAppArea').style.display = "block";
        });
    }

    function pushToCloud() {
        const cls = document.getElementById('classSelect').value;
        let update = {}; قائمة_الطلاب_كاملة[cls].forEach((_, i) => { update[i] = { status: document.getElementById('stat'+i).value }; });
        database.ref(`attendance/${todayKey}/${cls}/حصة_${selectedLesson}`).set(update).then(() => alert("✅ تم الحفظ"));
    }

    function adminShortcut() { window.cCount = (window.cCount || 0) + 1; if(window.cCount === 3) document.getElementById('loginArea').style.display="block"; }

    function checkPassword() { if(document.getElementById('passInput').value === "12345678910") { document.getElementById('loginArea').style.display = "none"; document.getElementById('adminPanel').style.display = "block"; startAdminSync(); } }

    function startAdminSync() {
        database.ref(`attendance/${todayKey}`).on('value', (snap) => {
            const dayData = snap.val() || {};
            let schTotal = 0, schAbs = 0, html = "";
            Object.keys(قائمة_الطلاب_كاملة).forEach(cls => {
                let cSize = قائمة_الطلاب_كاملة[cls].length;
                let cAbs = 0;
                قائمة_الطلاب_كاملة[cls].forEach((_, i) => {
                    let isAbs = false;
                    for(let l=1; l<=7; l++) { if(dayData[cls]?.['حصة_'+l]?.[i]?.status === 'a') { isAbs = true; break; } }
                    if(isAbs) cAbs++;
                });
                schTotal += cSize; schAbs += cAbs;
                html += `<tr><td>${cls}</td><td>${cSize}</td><td>${cSize-cAbs}</td><td>${cAbs}</td><td>${Math.round(((cSize-cAbs)/cSize)*100)}%</td></tr>`;
            });
            document.getElementById('sTotal').innerText = schTotal;
            document.getElementById('sPres').innerText = schTotal - schAbs;
            document.getElementById('sAbs').innerText = schAbs;
            document.getElementById('masterTableBody').innerHTML = html;
        });
    }

    // إصلاح تصدير PDF
    function exportPDF() {
        const header = document.getElementById('pdfHeader');
        const table = document.getElementById('exportArea');
        header.style.display = "block"; // إظهار الترويسة مؤقتاً
        
        const wrapper = document.createElement('div');
        wrapper.appendChild(header.cloneNode(true));
        wrapper.appendChild(table.cloneNode(true));

        const opt = {
            margin: 5,
            filename: 'تقرير_الغياب.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().from(wrapper).set(opt).save().then(() => {
            header.style.display = "none"; // إخفاء الترويسة بعد الانتهاء
        });
    }

    // إصلاح تصدير Excel (ترويسة نصية قوية)
    function exportExcel() {
        let rows = [
            ["سلطنة عمان - وزارة التربية والتعليم"],
            ["مدرسة يزيد بن الحارث للتعليم الأساسي"],
            ["تقرير الغياب اليومي بتاريخ: " + todayKey],
            ["مدير المدرسة: أ. هشام الكحالي"],
            [""],
            ["الصف", "العدد", "حاضر", "غائب", "% حضور"]
        ];
        
        document.querySelectorAll("#masterTableBody tr").forEach(tr => {
            let row = []; tr.querySelectorAll("td").forEach(td => row.push(td.innerText));
            rows.push(row);
        });

        let ws = XLSX.utils.aoa_to_sheet(rows);
        let wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "التقرير");
        XLSX.writeFile(wb, "الغياب.xlsx");
    }

    function openTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function generatePeriodReport() {
        const start = document.getElementById('periodStart').value;
        const end = document.getElementById('periodEnd').value;
        database.ref('attendance').once('value', (snap) => {
            const allData = snap.val() || {};
            let counts = {};
            Object.keys(allData).forEach(date => {
                if(date >= start && date <= end) {
                    Object.keys(allData[date]).forEach(cls => {
                        قائمة_الطلاب_كاملة[cls]?.forEach((name, i) => {
                            let isAbs = false;
                            for(let l=1; l<=7; l++) { if(allData[date][cls]['حصة_'+l]?.[i]?.status === 'a') isAbs = true; }
                            if(isAbs) { counts[name] = (counts[name] || 0) + 1; }
                        });
                    });
                }
            });
            let html = "<table class='main-table'><tr><th>الاسم</th><th>أيام الغياب</th></tr>";
            Object.entries(counts).forEach(([n, c]) => html += `<tr><td>${n}</td><td>${c}</td></tr>`);
            document.getElementById('periodResultArea').innerHTML = html + "</table>";
        });
    }
</script>
</body>
</html>
